<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>10-Year Master Plan | Vision Board</title>
    <style>
        :root {
            --bg: #050505;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
            --accent: #00d2ff;
            --gold: #ffcc00;
            --text: #ffffff;
            --text-dim: #a0a0a0;
        }

        body {
            background: radial-gradient(circle at top right, #1a1a2e, var(--bg));
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            padding: 20px;
            background: var(--glass);
            border-radius: 20px;
            border: 1px solid var(--accent);
        }

        h1 { margin: 0; letter-spacing: 2px; text-transform: uppercase; color: var(--accent); }
        p { color: var(--text-dim); font-size: 0.9rem; }

        .timeline {
            display: grid;
            gap: 25px;
        }

        .year-card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 20px;
            transition: 0.3s;
        }

        .year-card:hover {
            border-color: var(--gold);
            transform: scale(1.01);
        }

        .year-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
            margin-bottom: 15px;
        }

        .year-title {
            font-size: 1.2rem;
            font-weight: 800;
            color: var(--gold);
        }

        .plan-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 10px;
        }

        .month-box {
            background: rgba(0, 0, 0, 0.2);
            padding: 10px;
            border-radius: 10px;
            border: 1px solid var(--border);
        }

        .month-box label {
            display: block;
            font-size: 0.7rem;
            color: var(--accent);
            font-weight: bold;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        textarea {
            width: 100%;
            background: none;
            border: none;
            color: white;
            font-size: 0.85rem;
            resize: none;
            outline: none;
            height: 40px;
            font-family: inherit;
        }

        .actions {
            position: fixed;
            bottom: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
        }

        button {
            padding: 15px 25px;
            border-radius: 50px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            transition: 0.3s;
        }

        .btn-save { background: var(--accent); color: black; }
        .btn-print { background: var(--gold); color: black; }
        button:hover { transform: translateY(-5px); opacity: 0.9; }

        @media (max-width: 600px) {
            .plan-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>10-YEAR STRATEGIC PLAN</h1>
        <p>Disiplin adalah jembatan antara target dan pencapaian.</p>
    </header>

    <div class="timeline" id="timeline">
        <!-- Generasi Tahun akan dilakukan oleh JavaScript -->
    </div>
</div>

<div class="actions">
    <button class="btn-print" onclick="window.print()">SIMPAN PDF / CETAK</button>
    <button class="btn-save" onclick="saveVision()">SIMPAN PROGRESS</button>
</div>

<script>
    const months = [
        "Januari", "Februari", "Maret", "April", "Mei", "Juni", 
        "Juli", "Agustus", "September", "Oktober", "November", "Desember"
    ];

    function createVisionBoard() {
        const timeline = document.getElementById('timeline');
        const startYear = 2026;

        for (let i = 0; i < 10; i++) {
            const currentYear = startYear + i;
            const yearCard = document.createElement('div');
            yearCard.className = 'year-card';
            
            let monthHTML = '';
            months.forEach((month, index) => {
                monthHTML += `
                    <div class="month-box">
                        <label>${month}</label>
                        <textarea id="plan-${currentYear}-${index}" placeholder="Ketik target bulan ini..."></textarea>
                    </div>
                `;
            });

            yearCard.innerHTML = `
                <div class="year-header">
                    <div class="year-title">TAHUN ${i + 1} (${currentYear})</div>
                    <div style="font-size: 0.7rem; color: var(--text-dim)">MAIN GOAL: <input type="text" style="background:none; border:none; color:var(--gold); border-bottom:1px solid #333; outline:none;"></div>
                </div>
                <div class="plan-grid">
                    ${monthHTML}
                </div>
            `;
            timeline.appendChild(yearCard);
        }
    }

    function saveVision() {
        const inputs = document.querySelectorAll('textarea');
        const data = {};
        inputs.forEach(input => {
            data[input.id] = input.value;
        });
        localStorage.setItem('tenYearPlan', JSON.stringify(data));
        alert("Rencana 10 Tahun berhasil disimpan di browser ini!");
    }

    function loadVision() {
        const savedData = JSON.parse(localStorage.getItem('tenYearPlan'));
        if (savedData) {
            Object.keys(savedData).forEach(id => {
                const el = document.getElementById(id);
                if (el) el.value = savedData[id];
            });
        }
    }

    window.onload = () => {
        createVisionBoard();
        loadVision();
    };
</script>

</body>
</html>
